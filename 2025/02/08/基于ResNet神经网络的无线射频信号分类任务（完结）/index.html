ment"># 定制日志格式器，支持控制台彩色输出</span></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">CustomFormatter</span>(logging.Formatter):</span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">format</span>(<span class="params">self, record</span>):</span><br><span class="line">        <span class="comment"># 检查 record.msg 是否为字符串</span></span><br><span class="line">        <span class="keyword">if</span> <span class="built_in">isinstance</span>(record.msg, <span class="built_in">str</span>):</span><br><span class="line">            <span class="comment"># 如果 record.msg 是字符串，为其添加颜色代码 Fore.WHITE 和 Style.RESET_ALL</span></span><br><span class="line">            <span class="comment"># Fore.WHITE 表示文字颜色为白色</span></span><br><span class="line">            <span class="comment"># Style.RESET_ALL 用于重置颜色设置，避免影响后续的日志输出</span></span><br><span class="line">            record.msg = Fore.WHITE + record.msg + Style.RESET_ALL</span><br><span class="line">        <span class="comment"># 调用父类的 format 方法，完成日志的正常格式化</span></span><br><span class="line">        <span class="keyword">return</span> <span class="built_in">super</span>().<span class="built_in">format</span>(record)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 获取当前时间，格式化为字符串</span></span><br><span class="line">current_time = datetime.now().strftime(<span class="string">&quot;%Y%m%d_%H%M%S&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 配置日志记录器</span></span><br><span class="line"><span class="comment"># 日志文件夹路径</span></span><br><span class="line">log_dir = os.path.join(os.getcwd(), <span class="string">&quot;ResNet34&quot;</span>, <span class="string">f&quot;<span class="subst">&#123;current_time&#125;</span>&quot;</span>, <span class="string">&quot;results_file&quot;</span>)</span><br><span class="line"><span class="comment"># 确保日志文件夹存在</span span></span><br><span class="line">logger.addHandler(console_handler)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 优化后的残差块</span></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">BasicBlock</span>(nn.Module):</span><br><span class="line">    expansion = <span class="number">1</span>  <span class="comment"># 扩展因子，表示输出通道数相对于输入通道数的扩展倍数</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">__init__</span>(<span class="params">self, in_channels, out_channels, stride=<span class="number">1</span>, downsample=<span class="literal">None</span></span>):</span><br><span class="line">        <span class="built_in">super</span>(BasicBlock, <span class="variable language_">self</span>).__init__()</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 第一个卷积层</span></span><br><span class="line">        <span class="variable language_">self</span>.conv1 = nn.Conv2d(in_channels, out_channels, kernel_size=<span class="number">3</span>, stride=stride, padding=<span class="number">1</span>, bias=<span class="literal">False</span>)</span><br><span class="line">        <span class="comment"># 批归一化层，用于归一化卷积层的输出</span></span><br><span class="line">        <span class="variable language_">self</span>.bn1 = nn.BatchNorm2d(out_channels)</span><br><span class="line">        <span class="comment"># ReLU 激活函数，用于引入非线性</span></span><br><span class="line">        <span class="variable language_">self</span>.relu = nn.ReLU(inplace=<span class="literal">True</span>)</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 第二个卷积层</span></span><br><span class="line">        <span class="variable language_">self</span>.conv2 = nn.Conv2d(out_channels, out_channels, kernel_size=<span class="number">3</span>, stride=<span class="number">1</span>, padding=<span class="number">1</span>, bias=<span class="literal">False</span>)</span><br><span class="line">        <span class="comment"># 第二个批归一化层</span></span><br><span class="line">        <span class="variable language_">self</span>.bn2 = nn.BatchNorm2d(out_channels)</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 第三个卷积层</span></span><br><span class="line">        <span class="variable language_">self</span>.conv3 = nn.Conv2d(out_channels, out_channels, kernel_size=<span class="number">3</span>, stride=<span class="number">1</span>, padding=<span class="number">1</span>, bias=<span class="literal">False</span>)</span><br><span class="line">        <span class="comment"># 第三个批归一化层</span></span><br><span class="line">        <span class="variable language_">self</span>.bn3 = nn.BatchNorm2d(out_channels)</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 如果输入和输出通道数不同，或者步长不为 1，则需要下采样操作</span></span><br><span class="line">        <span class="variable language_">self</span>.downsample = downsample</span><br><span class="line"></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">forward</span>(<span class="params">self, x</span>):</span><br><span class="line">        <span class="comment"># 保存输入张量，用于残差连接</span></span><br><span class="line">        identity = x</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 如果需要下采样，对输入张量进行下采样</span></span><br><span class="line">        <span class="keyword">if</span> <span class="variable language_">self</span>.downsample <span class="keyword">is</span> <span class="keyword">not</span> <span class="literal">None</span>:</span><br><span class="line">            identity = <span class="variable language_">self</span>.downsample(x)</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 第一个卷积块</span></span><br><span class="line">        out = <span class="variable language_">self</span>.conv1(x)  <span class="comment"># 卷积操作</span></span><br><span class="line">        out = <span class="variable language_">self</span>.bn1(out)  <span class="comment"># 批归一化</span></span><br><span class="line">        out = <span class="variable language_">self</span>.relu(out)  <span class="comment"># 激活函数</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 第二个卷积块</span></span><br><span class="line">        out = <span class="variable language_">self</span>.conv2(out)  <span class="comment"># 卷积操作</span></span><br><span class="line">        out = <span class="variable language_">self</span>.bn2(out)  <span class="comment"># 批归一化</span></span><br><span class="line">        out = <span class="variable language_">self</span>.relu(out)  <span class="comment"># 激活函数</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 第三个卷积块</span></span><br><span class="line">        out = <span class="variable language_">self</span>.conv3(out)  <span class="comment"># 卷积操作</span></span><br><span class="line">        out = <span class="variable language_">self</span>.bn3(out)  <span class="comment"># 批归一化</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 残差连接</span></span><br><span class="line">        out += identity  <span class="comment"># 将原始输入与残差路径的输出相加</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 激活函数，最后输出</span></span><br><span class="line">        out = <span class="variable language_">self</span>.relu(out)</span><br><span class="line"></span><br><span class="line">        <span class="keyword">return</span> out</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 定义优化后的卷积神经网络</span></span><br><span class="line"><span class="keyword">class</span> <span class="title class_">ResNet34</span>(nn.Module):</span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">__init__</span>(<span class="params">self, block, layers, num_classes=<span class="number">10</span>, in_channels=<span class="number">4</span></span>):</span><br><span class="line">        <span class="built_in">super</span>(ResNet34, <span class="variable language_">self</span>).__init__()</span><br><span class="line">        <span class="variable language_">self</span>.in_channels = <span class="number">64</span>  <span class="comment"># 当前层的输入通道数</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 初始卷积层和批归一化层</span></span><br><span class="line">        <span class="variable language_">self</span>.conv1 = nn.Conv2d(in_channels, <span class="number">64</span>, kernel_size=<span class="number">7</span>, stride=<span class="number">2</span>, padding=<span class="number">3</span>, bias=<span class="literal">False</span>)</span><br><span class="line">        <span class="variable language_">self</span>.bn1 = nn.BatchNorm2d(<span class="number">64</span>)</span><br><span class="line">        <span class="variable language_">self</span>.relu = nn.ReLU(inplace=<span class="literal">True</span>)</span><br><span class="line">        <span class="variable language_">self</span>.maxpool = nn.MaxPool2d(kernel_size=<span class="number">3</span>, stride=<span class="number">2</span>, padding=<span class="number">1</span>)</span><br><span class="line"></span><br><span class="line">        <span class="comment"># 构建残差层</span></span><br><span class="line">        <span class="variable language_">self</span>.layer1 = <span class="variable language_">self</span>._make_layer(block, <span class="number">64</span>, layers[<span class="number">0</span>], stride=<span class="number">1</span>)  <span class="comment"># 第1层残差块</span></span><br><span class="line">        <span class="variable language_">self</span>.layer2 = <span class="variable language_">self</span>._make_layer(block, <span class="number">128</span>, layers[<span class="number">1</span>], stride=<span class="number">2</span>)  <span class="comment"># 第2层残差块</span></span><br><span class="line">        <span class="variable language_">self</span>.layer3 = <span class="variable language_">self</span>._make_layer(block, <span class="number">256</span>, layers[<span class="number">2</span>], stride=<span class="number">2</span>)  <span class="comment"># 第3层残差块</span></span><br><span class="line">        <span class="variable language_">self</span>.layer4 = <span class="variable language_">self</span>._make_layer(block, <span class="number">512</span>, layers[<span class="number">3</span>], stride=<span class="number">2</span>)  <span class="comment"># 第4层残差块</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 全局平均池化和全连接层</span></span><br><span class="line">        <span class="variable language_">self</span>.avgpool = nn.AdaptiveAvgPool2d((<span class="number">1</span>, <span class="number">1</span>))  <span class="comment"># 自适应平均池化，输出大小为 (1, 1)</span></span><br><span class="line">        <span class="variable language_">self</span>.fc = nn.Linear(<span class="number">512</span> * block.expansion, num_classes)  <span class="comment"># 全连接层，用于分类</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">_make_layer</span>(<span class="params">self, block, out_channels, blocks, stride=<span class="number">1</span></span>):</span><br><span class="line">        <span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">        构建残差层</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">        参数:</span></span><br><span class="line"><span class="string">        - block: 残差块的类型</span></span><br><span class="line"><span class="string">        - out_channels: 输出通道数</span></span><br><span class="line"><span class="string">        - blocks: 残差块的数量</span></span><br><span class="line"><span class="string">        - stride: 步长</span></span><br><span class="line"><span class="string">        &quot;&quot;&quot;</span></span><br><span class="line">        downsample = <span class="literal">None</span>  <span class="comment"># 下采样操作</span></span><br><span class="line">        <span class="keyword">if</span> stride != <span class="number">1</span> <span class="keyword">or</span> <span class="variable language_">self</span>.in_channels != out_channels * block.expansion:</span><br><span class="line">            <span class="comment"># 当步长不为 1，或者输入通道数与输出通道数不匹配时，需要下采样</span></span><br><span class="line">            downsample = nn.Sequential(</span><br><span class="line">                nn.Conv2d(<span class="variable language_">self</span>.in_channels, out_channels * block.expansion, kernel_size=<span class="number">1</span>, stride=stride, bias=<span class="literal">False</span>),</span><br><span class="line">                nn.BatchNorm2d(out_channels * block.expansion), )</span><br><span class="line"></span><br><span class="line">        layers = []  <span class="comment"># 保存残差块</span></span><br><span class="line">        <span class="comment"># 添加第一个残差块</span></span><br><span class="line">        layers.append(block(<span class="variable language_">self</span>.in_channels, out_channels, stride, downsample))</span><br><span class="line">        <span class="variable language_">self</span>.in_channels = out_channels * block.expansion  <span class="comment"># 更新当前层的输入通道数</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 添加剩下的残差块</span></span><br><span class="line">        <span class="keyword">for</span> _ <span class="keyword">in</span> <span class="built_in">range</span>(<span class="number">1</span>, blocks):</span><br><span class="line">            layers.append(block(<span class="variable language_">self</span>.in_channels, out_channels))</span><br><span class="line"></span><br><span class="line">        <span class="keyword">return</span> nn.Sequential(*layers)  <span class="comment"># 将残差块组合成一个顺序层</span></span><br><span class="line"></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">forward</span>(<span class="params">self, x</span>):</span><br><span class="line">        <span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">        前向传播</span></span><br><span class="line"><span class="string">        &quot;&quot;&quot;</span></span><br><span class="line">        <span class="comment"># 初始卷积层</span></span><br><span class="line">        x = <span class="variable language_">self</span>.conv1(x)  <span class="comment"># 卷积操作</span></span><br><span class="line">        x = <span class="variable language_">self</span>.bn1(x)  <span class="comment"># 批归一化</span></span><br><span class="line">        x = <span class="variable language_">self</span>.relu(x)  <span class="comment"># ReLU 激活</span></span><br><span class="line">        x = <span class="variable language_">self</span>.maxpool(x)  <span class="comment"># 最大池化</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 残差层</span></span><br><span class="line">        x = <span class="variable language_">self</span>.layer1(x)  <span class="comment"># 第1层残差块</span></span><br><span class="line">        x = <span class="variable language_">self</span>.layer2(x)  <span class="comment"># 第2层残差块</span></span><br><span class="line">        x = <span class="variable language_">self</span>.layer3(x)  <span class="comment"># 第3层残差块</span></span><br><span class="line">        x = <span class="variable language_">self</span>.layer4(x)  <span class="comment"># 第4层残差块</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 全局平均池化</span></span><br><span class="line">        x = <span class="variable language_">self</span>.avgpool(x)  <span class="comment"># 自适应平均池化，输出大小为 (1, 1)</span></span><br><span class="line">        x = torch.flatten(x, <span class="number">1</span>)  <span class="comment"># 展平张量</span></span><br><span class="line"></span><br><span class="line">        <span class="comment"># 全连接层</span></span><br><span class="line">        x = <span class="variable language_">self</span>.fc(x)  <span class="comment"># 分类输出</span></span><br><span class="line"></span><br><span class="line">        <span class="keyword">return</span> x</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">Resnet34</span>(<span class="params">num_classes=<span class="number">10</span>, in_channels=<span class="number">4</span></span>):</span><br><span class="line">    <span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">    创建并返回一个 ResNet34 模型实例。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">    参数:</span></span><br><span class="line"><span class="string">    - num_classes (int): 分类任务的类别数，默认为 10。</span></span><br><span class="line"><span class="string">    - in_channels (int): 输入的通道数，默认为 4。更改数据及后更改为6</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">    返回:</span></span><br><span class="line"><span class="string">    - ResNet34: 一个预定义的 ResNet34 模型实例。</span></span><br><span class="line"><span class="string">    &quot;&quot;&quot;</span></span><br><span class="line">    <span class="keyword">return</span> ResNet34(block=BasicBlock, layers=[<span class="number">3</span>, <span class="number">4</span>, <span class="number">6</span>, <span class="number">3</span>], num_classes=num_classes, in_channels=in_channels)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 定义计算训练时间的函数</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">Calculate_Time</span>(<span class="params"><span class="built_in">str</span>, elapsed_time</span>):</span><br><span class="line">    <span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">    计算每个阶段的训练用时</span></span><br><span class="line"><span class="string">    :param str: 需要明确的训练阶段</span></span><br><span class="line"><span class="string">    :param elapsed_time: 该阶段训练总用时</span></span><br><span class="line"><span class="string">    :return:</span></span><br><span class="line"><span class="string">    &quot;&quot;&quot;</span></span><br><span class="line">    <span class="comment"># 将总耗时转换为小时、分钟和秒</span></span><br><span class="line">    hours = <span class="built_in">int</span>(elapsed_time // <span class="number">3600</span>)</span><br><span class="line">    minutes = <span class="built_in">int</span>((elapsed_time % <span class="number">3600</span>) // <span class="number">60</span>)</span><br><span class="line">    seconds = <span class="built_in">int</span>(elapsed_time % <span class="number">60</span>)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 打印耗时</span></span><br><span class="line">    logger.debug(<span class="string">f&quot;<span class="subst">&#123;<span class="built_in">str</span>&#125;</span>耗时: <span class="subst">&#123;hours&#125;</span> 小时 <span class="subst">&#123;minutes&#125;</span> 分钟 <span class="subst">&#123;seconds&#125;</span> 秒&quot;</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 优化后的小波去噪函数</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">wavelet_denoising</span>(<span class="params">signal, wavelet=<span class="string">&#x27;db4&#x27;</span>, level=<span class="number">2</span>, threshold=<span class="number">0.1</span></span>):</span><br><span class="line">    <span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">    使用小波去噪处理信号</span></span><br><span class="line"><span class="string">    :param signal: 输入信号</span></span><br><span class="line"><span class="string">    :param wavelet: 小波基函数</span></span><br><span class="line"><span class="string">    :param level: 分解层数</span></span><br><span class="line"><span class="string">    :param threshold: 阈值</span></span><br><span class="line"><span class="string">    :return: 去噪后的信号</span></span><br><span class="line"><span class="string">    &quot;&quot;&quot;</span></span><br><span class="line">    coeffs = pywt.wavedec(signal, wavelet, level=level)</span><br><span class="line">    coeffs_filtered = [pywt.threshold(c, threshold * <span class="built_in">max</span>(c), mode=<span class="string">&#x27;soft&#x27;</span>) <span class="keyword">for</span> c <span class="keyword">in</span> coeffs]</span><br><span class="line">    <span class="keyword">return</span> pywt.waverec(coeffs_filtered, wavelet)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">apply_convolution_filter</span>(<span class="params">data, kernel=<span class="literal">None</span>, mode=<span class="string">&#x27;same&#x27;</span>, method=<span class="string">&#x27;auto&#x27;</span></span>):</span><br><span class="line">    <span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">    将输入的数据应用一维卷积滤波，并返回滤波后的结果。</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">    参数:</span></span><br><span class="line"><span class="string">        data (ndarray): 输入的信号数据，形状为 (num_samples, num_channels, time_steps)。</span></span><br><span class="line"><span class="string">        kernel (ndarray, optional): 一维卷积核。如果未提供，则使用默认核 [1, -2, 1] / 3。</span></span><br><span class="line"><span class="string">        mode (str, optional): 卷积模式，可选 &#x27;full&#x27;, &#x27;valid&#x27;, 或 &#x27;same&#x27;。默认为 &#x27;same&#x27;。</span></span><br><span class="line"><span class="string">        method (str, optional): 卷积的计算方法，可选 &#x27;direct&#x27;, &#x27;fft&#x27;, 或 &#x27;auto&#x27;。默认为 &#x27;auto&#x27;.</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">    返回:</span></span><br><span class="line"><span class="string">        ndarray: 经过卷积滤波后的数据，形状与输入一致（当 mode=&#x27;same&#x27; 时）。</span></span><br><span class="line"><span class="string">    &quot;&quot;&quot;</span></span><br><span class="line">    <span class="keyword">if</span> kernel <span class="keyword">is</span> <span class="literal">None</span>:</span><br><span class="line">        kernel = np.array([<span class="number">1</span>, -<span class="number">2</span>, <span class="number">1</span>]) / <span class="number">3</span>  <span class="comment"># 默认卷积核</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 检查输入数据的维度</span></span><br><span class="line">    <span class="keyword">if</span> <span class="built_in">len</span>(data.shape) != <span class="number">3</span>:</span><br><span class="line">        <span class="keyword">raise</span> ValueError(<span class="string">&quot;Input data should be 3-dimensional with shape (samples, channels, time_steps)&quot;</span>)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 沿时间维度进行卷积</span></span><br><span class="line">    filtered_data = np.apply_along_axis(<span class="keyword">lambda</span> x: convolve(x, kernel, mode=mode, method=method), axis=-<span class="number">1</span>, arr=data)</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> filtered_data</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 开始计时</span></span><br><span class="line">start_time_data_preparation = time.time()</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------数据准备阶段开始计时------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 设置Matplotlib支持中文显示</span></span><br><span class="line">plt.rcParams[<span class="string">&#x27;font.sans-serif&#x27;</span>] = [<span class="string">&#x27;SimHei&#x27;</span>]  <span class="comment"># 设置中文显示为黑体</span></span><br><span class="line">plt.rcParams[<span class="string">&#x27;axes.unicode_minus&#x27;</span>] = <span class="literal">False</span>  <span class="comment"># 正确显示负号</span></span><br><span class="line"></span><br><span class="line"><span class="comment"># 创建文件夹路径</span></span><br><span class="line"><span class="comment"># 损失函数图片保存路径</span></span><br><span class="line">loss_curve_img_path = os.path.join(os.getcwd(), <span class="string">&quot;ResNet34&quot;</span>, <span class="string">f&quot;<span class="subst">&#123;current_time&#125;</span>&quot;</span>, <span class="string">&quot;results_file&quot;</span>)  <span class="comment"># 使用相对路径</span></span><br><span class="line"><span class="comment"># 如果文件夹不存在，则创建</span></span><br><span class="line">os.makedirs(loss_curve_img_path, exist_ok=<span class="literal">True</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 混淆矩阵图片保存路径</span></span><br><span class="line">confusion_matrix_img_path = os.path.join(os.getcwd(), <span class="string">&quot;ResNet34&quot;</span>, <span class="string">f&quot;<span class="subst">&#123;current_time&#125;</span>&quot;</span>, <span class="string">&quot;images&quot;</span>, <span class="string">&quot;confusion_matrix&quot;</span>)</span><br><span class="line">os.makedirs(confusion_matrix_img_path, exist_ok= omment"># 原始数据</span></span><br><span class="line">    original = value  <span class="comment"># 形状为 (6000, 2, 128)</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 将原始数据进行卷积滤波降噪</span></span><br><span class="line">    filtered_data = apply_convolution_filter(original)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 将原数据进行小波去噪</span></span><br><span class="line">    denoised = np.apply_along_axis(wavelet_denoising, axis=<span class="number">2</span>, arr=original)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># # 合并原始数据、小波降噪的数据、卷积滤波的数据</span></span><br><span class="line">    <span class="comment"># combined = np.concatenate([original, denoised, filtered_data], axis=1)  # 形状变为 (6000, 6, 128)</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 合并原始数据、小波降噪的数据</span></span><br><span class="line">    combined = np.concatenate([original, denoised], axis=<span class="number">1</span>)  <span class="comment"># 形状变为 (6000, 4, 128)</span></span><br><span class="line">    <span class="comment"># 数据的形状为(6000, 4, 128)</span></span><br><span class="line">    features.append(combined)</span><br><span class="line">    <span class="comment"># 创建与特征数据对应的标签</span></span><br><span class="line">    labels.append(np.full(value.shape[<span class="number">0</span>], modulation))</span><br><span class="line">    <span class="comment"># 创建与特征数据对应的信噪比标签</span></span><br><span class="line">    snr_labels.append(np.full(value.shape[<span class="number">0</span>], snr))</span><br><span class="line">logger.debug(<span class="string">f&quot;提取的特征列表的形状: <span class="subst">&#123;<span class="built_in">len</span>(features)&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;提取的标签列表的形状: <span class="subst">&#123;<span class="built_in">len</span>(labels)&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;提取的信噪比标签列表的形状: <span class="subst">&#123;<span class="built_in">len</span>(snr_labels)&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 将特征和标签合并为一个数组</span></span><br><span class="line"><span class="comment"># 将所有特征数据堆叠成一个三维数组，形状为 (总样本数, 4, 128)</span></span><br><span class="line">features = np.vstack(features)</span><br><span class="line"><span class="comment"># 将所有标签数据堆叠成一个一维数组</span></span><br><span class="line">labels = np.hstack(labels)</span><br><span class="line"><span class="comment"># 将所有信噪比标签堆叠成一个一维数组</span></span><br><span class="line">snr_labels = np.hstack(snr_labels)</span><br><span class="line">logger.debug(<span class="string">f&quot;合并后的特征形状: <span class="subst">&#123;features.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;合并后的标签形状: <span class="subst">&#123;labels.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;合并后的信噪比标签形状: <span class="subst">&#123;snr_labels.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 将字符串标签转换为整数索引</span></span><br><span class="line"><span class="comment"># 获取所有唯一的标签</span></span><br><span class="line">unique_labels = np.unique(labels)</span><br><span class="line"><span class="comment"># 创建标签到索引的映射</span></span><br><span class="line">label_to_index = &#123;label: idx <span class="keyword">for</span> idx, label <span class="keyword">in</span> <span class="built_in">enumerate</span>(unique_labels)&#125;</span><br><span class="line"><span class="comment"># 将标签转换为整数索引</span></span><br><span class="line">labels = np.array([label_to_index[label] <span class="keyword">for</span> label <span class="keyword">in</span> labels])</span><br><span class="line">logger.debug(<span class="string">f&quot;唯一标签: <span class="subst">&#123;unique_labels&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;标签到索引的映射: <span class="subst">&#123;label_to_index&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;转换后的标签形状: <span class="subst">&#123;labels.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 转换为张量</span></span><br><span class="line"><span class="comment"># 将特征数据转换为浮点型张量</span></span><br><span class="line">features = torch.tensor(features, dtype=torch.float32)</span><br><span class="line"><span class="comment"># 将标签数据转换为长整型张量</span></span><br><span class="line">labels = torch.tensor(labels, dtype=torch.long)</span><br><span class="line"><span class="comment"># 将信噪比标签转换为浮点型张量</span></span><br><span class="line">snr_labels = torch.tensor(snr_labels, dtype=torch.float32)</span><br><span class="line">logger.debug(<span class="string">f&quot;转换为张量后的特征形状: <span class="subst">&#123;features.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;转换为张量后的标签形状: <span class="subst">&#123;labels.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;转换为张量后的信噪比标签形状: <span class="subst">&#123;snr_labels.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 调整数据形状以适应CNN输入</span></span><br><span class="line"><span class="comment"># 将形状从 [batch_size, 2, 128] 调整为 [batch_size, 2, 1, 128]</span></span><br><span class="line">features = features.unsqueeze(<span class="number">2</span>)  <span class="comment"># 在通道维度后增加一个维度</span></span><br><span class="line">logger.debug(<span class="string">f&quot;调整形状后的特征形状: <span class="subst">&#123;features.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 划分训练集和测试集</span></span><br><span class="line"><span class="comment"># 训练集的数据占总数据的70%</span></span><br><span class="line">train_size = <span class="built_in">int</span>(<span class="built_in">len</span>(features) * <span class="number">0.7</span>)</span><br><span class="line"><span class="comment"># 测试集的数据占总数据的30%</span></span><br><span class="line">test_size = <span class="built_in">len</span>(features) - train_size</span><br><span class="line"><span class="comment"># 随机打乱索引</span></span><br><span class="line">indices = torch.randperm(<span class="built_in">len</span>(features))</span><br><span class="line"><span class="comment"># 根据打乱的索引重新排列特征数据</span></span><br><span class="line">features = features[indices]</span><br><span class="line"><span class="comment"># 根据打乱的索引重新排列标签数据</span></span><br><span class="line">labels = labels[indices]</span><br><span class="line"><span class="comment"># 根据打乱的索引重新排列信噪比标签数据</span></span><br><span class="line">snr_labels = snr_labels[indices]</span><br><span class="line"><span class="comment"># 划分训练集特征</span></span><br><span class="line">train_X = features[:train_size]</span><br><span class="line"><span class="comment"># 划分训练集标签</span></span><br><span class="line">train_Y = labels[:train_size]</span><br><span class="line"><span class="comment"># 划分训练集信噪比标签</span></span><br><span class="line">train_snr_Y = snr_labels[:train_size]</span><br><span class="line"><span class="comment"># 划分测试集特征</span></span><br><span class="line">test_X = features[train_size:]</span><br><span class="line"><span class="comment"># 划分测试集标签</span></span><br><span class="line">test_Y = labels[train_size:]</span><br><span class="line"><span class="comment"># 划分测试集信噪比标签</span></span><br><span class="line">test_snr_Y = snr_labels[train_size:]</span><br><span class="line">logger.debug(<span class="string">f&quot;训练集特征形状: <span class="subst">&#123;train_X.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;训练集标签形状: <span class="subst">&#123;train_Y.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;训练集信噪比标签形状: <span class="subst">&#123;train_snr_Y.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;测试集特征形状: <span class="subst">&#123;test_X.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;测试集标签形状: <span class="subst">&#123;test_Y.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;测试集信噪比标签形状: <span class="subst">&#123;test_snr_Y.shape&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 创建数据集</span></span><br><span class="line"><span class="comment"># 创建训练数据集</span></span><br><span class="line">train_dataset = TensorDataset(train_X, train_Y, train_snr_Y)</span><br><span class="line"><span class="comment"># 创建测试数据集</span></span><br><span class="line">test_dataset = TensorDataset(test_X, test_Y, test_snr_Y)</span><br><span class="line">logger.debug(<span class="string">f&quot;训练数据集大小: <span class="subst">&#123;<span class="built_in">len</span>(train_dataset)&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;测试数据集大小: <span class="subst">&#123;<span class="built_in">len</span>(test_dataset)&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 创建数据加载器，可以更换更大的批次尺寸256</span></span><br><span class="line">batch_size = <span class="number">128</span>  <span class="comment"># 设置批次大小</span></span><br><span class="line"><span class="comment"># 创建训练数据加载器，随机打乱数据</span></span><br><span class="line">train_loader = DataLoader(train_dataset, batch_size=batch_size, shuffle=<span class="literal">True</span>)</span><br><span class="line"><span class="comment"># 创建测试数据加载器，不打乱数据</span></span><br><span class="line">test_loader = DataLoader(test_dataset, batch_size=batch_size, shuffle=<span class="literal">False</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 结束计时</span></span><br><span class="line">end_time_data_preparation = time.time()</span><br><span class="line"><span class="comment"># 计算数据准备阶段耗时</span></span><br><span class="line">data_preparation_time = end_time_data_preparation - start_time_data_preparation</span><br><span class="line"><span class="comment"># 输出数据准备阶段所耗时间</span></span><br><span class="line">Calculate_Time(<span class="string">&quot;数据准备阶段&quot;</span>, data_preparation_time)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------数据准备阶段结束计时------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 模型训练阶段</span></span><br><span class="line"><span class="comment"># 模型训练阶段开始计时</span></span><br><span class="line">start_time_model_train = time.time()</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------模型训练阶段开始计时------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 实例化模型</span></span><br><span class="line"><span class="comment"># model = Resnet34(num_classes=10, in_channels=6).to(device)</span></span><br><span class="line">model = Resnet34(num_classes=<span class="number">10</span>, in_channels=<span class="number">4</span>).to(device)</span><br><span class="line">logger.debug(<span class="string">f&quot;模型的结构为<span class="subst">&#123;model&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;模型已实例化，设备: <span class="subst">&#123;device&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 可视化模型</span></span><br><span class="line"><span class="comment"># 模拟输入数据，达到可视化计算过程的目的</span></span><br><span class="line"><span class="comment"># dummy_input = torch.randn(128, 6, 1, 128).to(device)  # 调整通道数为 6</span></span><br><span class="line">dummy_input = torch.randn(<span class="number">128</span>, <span class="number">4</span>, <span class="number">1</span>, <span class="number">128</span>).to(device)  <span class="comment"># 调整通道数为 4</span></span><br><span class="line">tb_writer.add_graph(model, dummy_input)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 损失函数和优化器</span></span><br><span class="line"><span class="comment"># 定义类别权重</span></span><br><span class="line">class_weights = torch.tensor([<span class="number">1.0</span>, <span class="number">1.0</span>, <span class="number">1.0</span>, <span class="number">1.0</span>, <span class="number">1.0</span>, <span class="number">1.0</span>, <span class="number">2.0</span>, <span class="number">2.0</span>, <span class="number">1.0</span>, <span class="number">1.0</span>]).to(device)</span><br><span class="line"><span class="comment"># 定义带权重的交叉熵损失函数</span></span><br><span class="line">criterion = nn.CrossEntropyLoss(weight=class_weights, label_smoothing=<span class="number">0.1</span>)</span><br><span class="line">optimizer = AdamW(model.parameters(), lr=<span class="number">0.001</span>, weight_decay=<span class="number">0.01</span>)</span><br><span class="line">scheduler = CosineAnnealingWarmRestarts(optimizer, T_0=<span class="number">5</span>, T_mult=<span class="number">2</span>, eta_min=<span class="number">1e-6</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;损失函数: <span class="subst">&#123;criterion&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;优化器: <span class="subst">&#123;optimizer&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;学习率调度器: <span class="subst">&#123;scheduler&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 训练模型</span></span><br><span class="line">epochs = <span class="number">1</span>  <span class="comment"># 设置训练轮数，1为测试使用，训练时根据实际情况进行调整</span></span><br><span class="line">losses = []  <span class="comment"># 用于存储每轮训练的损失值</span></span><br><span class="line"><span class="keyword">for</span> epoch <span class="keyword">in</span> <span class="built_in">range</span>(epochs):</span><br><span class="line">    logger.debug(<span class="string">f&quot;正在进行第<span class="subst">&#123;epoch + <span class="number">1</span>&#125;</span>轮训练&quot;</span>)</span><br><span class="line">    train_start_time = time.time()</span><br><span class="line">    model.train()  <span class="comment"># 将模型设置为训练模式</span></span><br><span class="line">    running_loss = <span class="number">0.0</span>  <span class="comment"># 初始化每轮的累计损失</span></span><br><span class="line">    <span class="keyword">for</span> X_batch, Y_batch, _ <span class="keyword">in</span> train_loader:  <span class="comment"># 遍历训练数据加载器</span></span><br><span class="line">        X_batch, Y_batch = X_batch.to(device), Y_batch.to(device)  <span class="comment"># 将数据移动到指定设备</span></span><br><span class="line">        optimizer.zero_grad()  <span class="comment"># 清空之前的梯度</span></span><br><span class="line">        Pred = model(X_batch)  <span class="comment"># 前向传播，获取预测结果</span></span><br><span class="line">        loss = criterion(Pred, Y_batch)  <span class="comment"># 计算损失值</span></span><br><span class="line">        loss.backward()  <span class="comment"># 反向传播，计算梯度</span></span><br><span class="line">        optimizer.step()  <span class="comment"># 更新模型参数</span></span><br><span class="line">        running_loss += loss.item() * X_batch.size(<span class="number">0</span>)  <span class="comment"># 累计损失值</span></span><br><span class="line">    <span class="comment"># 假设 val_loss 是验证损失</span></span><br><span class="line">    val_loss = torch.tensor(<span class="number">0.1</span>)  <span class="comment"># 示例损失值</span></span><br><span class="line">    <span class="comment"># 更新调度器</span></span><br><span class="line">    scheduler.step(val_loss)</span><br><span class="line">    <span class="comment"># 获取当前学习率并打印</span></span><br><span class="line">    current_lr = scheduler.get_last_lr()[<span class="number">0</span>]</span><br><span class="line">    logger.debug(<span class="string">f&quot;Epoch <span class="subst">&#123;epoch + <span class="number">1</span>&#125;</span>, Learning Rate: <span class="subst">&#123;current_lr:<span class="number">.6</span>f&#125;</span>&quot;</span>)</span><br><span class="line">    epoch_loss = running_loss / <span class="built_in">len</span>(train_loader.dataset)  <span class="comment"># 计算本轮平均损失</span></span><br><span class="line">    losses.append(epoch_loss)  <span class="comment"># 将本轮损失值存储到列表中</span></span><br><span class="line">    <span class="comment"># 这一轮训练结束</span></span><br><span class="line">    train_end_time = time.time()</span><br><span class="line">    <span class="comment"># 本轮训练的时间</span></span><br><span class="line">    train_time = train_end_time - train_start_time</span><br><span class="line">    <span class="comment"># 输出本轮训练耗时</span></span><br><span class="line">    Calculate_Time(<span class="string">f&quot;第<span class="subst">&#123;epoch + <span class="number">1</span>&#125;</span>轮训练&quot;</span>, train_time)</span><br><span class="line">    logger.debug(<span class="string">f&#x27;Epoch [<span class="subst">&#123;epoch + <span class="number">1</span>&#125;</span>/<span class="subst">&#123;epochs&#125;</span>], Loss: <span class="subst">&#123;epoch_loss:<span class="number">.4</span>f&#125;</span>&#x27;</span>)</span><br><span class="line"></span><br><span class="line">logger.debug(<span class="string">&quot;模型训练完成&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 模型训练阶段结束计时</span></span><br><span class="line">end_time_model_train = time.time()</span><br><span class="line"><span class="comment"># 计算数据准备阶段耗时</span></span><br><span class="line">model_train_time = end_time_model_train - start_time_model_train</span><br><span class="line"><span class="comment"># 输出数据准备阶段所耗时间</span></span><br><span class="line">Calculate_Time(<span class="string">f&quot;模型<span class="subst">&#123;epochs&#125;</span>轮训练阶段&quot;</span>, model_train_time)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------模型训练阶段停止计时------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 模型评估及绘图阶段</span></span><br><span class="line"><span class="comment"># 模型评估及绘图阶段开始计时</span></span><br><span class="line">start_time_model_eval = time.time()</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------模型评估及绘图阶段开始计时------------------&gt;&quot;</span>)</spa 7;</span>), dpi=<span class="number">600</span>)</span><br><span class="line">plt.close()</span><br><span class="line"></span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------整体归一化混淆矩阵热力图绘制开始------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 绘制整体归一化混淆矩阵热力图</span></span><br><span class="line">plt.figure(figsize=(<span class="number">12</span>, <span class="number">10</span>))</span><br><span class="line">sns.heatmap(overall_cm_normalized, annot=<span class="literal">True</span>, fmt=<span class="string">&#x27;.2f&#x27;</span>, cmap=<span class="string">&#x27;Blues&#x27;</span>, xticklabels=unique_labels,</span><br><span class="line">            yticklabels=unique_labels)</span><br><span class="line">plt.xlabel(<span class="string">&#x27;预测标签&#x27;</span>, fontsize=<span class="number">14</span>)</span><br><span class="line">plt.ylabel(<span class="string">&#x27;真实标签&#x27;</span>, fontsize=<span class="number">14</span>)</span><br><span class="line">plt.title(<span class="string">&#x27;整体归一化混淆矩阵热力图&#x27;</span>, fontsize=<span class="number">16</span>)</span><br><span class="line">plt.xticks(rotation=<span class="number">45</span>)</span><br><span class="line">plt.yticks(rotation=<span class="number">0</span>)</span><br><span class="line">plt.savefig(os.path.join(loss_curve_img_path, <span class="string">&#x27;Overall_CMN_heatmap.png&#x27;</span>), dpi=<span class="number">600</span>)</span><br><span class="line">plt.close()</span><br><span class="line"></span><br><span class="line">logger.debug(<span class="string">&quot;整体混淆矩阵、归一化混淆矩阵以及热力图绘制完成，已保存&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 保存完整模型</span></span><br><span class="line">model_file = os.path.join(model_path, <span class="string">f&#x27;ResNet34_<span class="subst">&#123;current_time&#125;</span>_<span class="subst">&#123;test_accuracy:<span class="number">.2</span>f&#125;</span>.pth&#x27;</span>)  <span class="comment"># 模型保存路径</span></span><br><span class="line">torch.save(model, model_file)  <span class="comment"># 保存完整模型</span></span><br><span class="line">logger.debug(<span class="string">f&#x27;模型已保存到 <span class="subst">&#123;model_file&#125;</span>&#x27;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 读取保存的 CSV 文件</span></span><br><span class="line">df = pd.read_csv(csv_file_path)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 数据预览</span></span><br><span class="line">logger.debug(<span class="string">&quot;数据预览：&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;Data preview:\n<span class="subst">&#123;df.head().to_string()&#125;</span>&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------------------------&gt;&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 绘制整体准确率随信噪比的变化趋势</span></span><br><span class="line">plt.figure(figsize=(<span class="number">12</span>, <span class="number">6</span>))</span><br><span class="line">sns.lineplot(x=<span class="string">&#x27;SNR&#x27;</span>, y=<span class="string">&#x27;Overall_Accuracy&#x27;</span>, data=df, marker=<span class="string">&#x27;o&#x27;</span>, color=<span class="string">&#x27;blue&#x27;</span>)</span><br><span class="line">plt.title(<span class="string">&#x27;整体准确率随信噪比的变化趋势&#x27;</span>)</span><br><span class="line">plt.xlabel(<span class="string">&#x27;信噪比&#x27;</span>)</span><br><span class="line">plt.ylabel(<span class="string">&#x27;准确率&#x27;</span>)</span><br><span class="line">plt.grid(<span class="literal">True</span>)</span><br><span class="line">plt.savefig(os.path.join(loss_curve_img_path, <span class="string">&#x27;整体准确率随信噪比的变化趋势&#x27;</span>), dpi=<span class="number">600</span>)</span><br><span class="line">plt.close()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 绘制每类别的 F1 分数随信噪比的变化趋势</span></span><br><span class="line">class_columns = [col <span class="keyword">for</span> col <span class="keyword">in</span> df.columns <span class="keyword">if</span> col.startswith(<span class="string">&#x27;Class_&#x27;</span>) <span class="keyword">and</span> <span class="string">&#x27;F1&#x27;</span> <span class="keyword">in</span> col]</span><br><span class="line"><span class="keyword">for</span> col <span class="keyword">in</span> class_columns:</span><br><span class="line">    plt.figure(figsize=(<span class="number">12</span>, <span class="number">6</span>))</span><br><span class="line">    sns.lineplot(x=<span class="string">&#x27;SNR&#x27;</span>, y=col, data=df, marker=<span class="string">&#x27;o&#x27;</span>)</span><br><span class="line">    plt.title(<span class="string">f&#x27;<span class="subst">&#123;col&#125;</span> 随信噪比的变化趋势&#x27;</span>)</span><br><span class="line">    plt.xlabel(<span class="string">&#x27;信噪比&#x27;</span>)</span><br><span class="line">    plt.ylabel(<span class="string">&#x27;F1 分数&#x27;</span>)</span><br><span class="line">    plt.grid(<span class="literal">True</span>)</span><br><span class="line">    plt.savefig(os.path.join(trends_change_img_path, <span class="string">f&#x27;<span class="subst">&#123;col&#125;</span> 随信噪比的变化趋势&#x27;</span>), dpi=<span class="number">600</span>)</span><br><span class="line">    plt.close()</span><br><span class="line"></span><br><span class="line"><span class="comment"># 找出整体性能最佳的信噪比</span></span><br><span class="line">best_snr = df.loc[df[<span class="string">&#x27;Overall_Accuracy&#x27;</span>].idxmax()][<span class="string">&#x27;SNR&#x27;</span>]</span><br><sp span class="line"><span class="comment"># 总耗时</span></span><br><span class="line">model_time = model_eval_time + model_train_time + data_preparation_time</span><br><span class="line">logger.debug(<span class="string">&quot;&lt;-------------程序运行完毕------------------&gt;&quot;</span>)</span><br><span class="line"><span class="comment"># 日志模块</span></span><br><span class="line">logger.debug(<span class="string">f&quot;本次共进行<span class="subst">&#123;epochs&#125;</span>次模型训练&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;各阶段耗时情况为：&quot;</span>)</span><br><span class="line">Calculate_Time(<span class="string">&quot;数据准备阶段&quot;</span>, data_preparation_time)</span><br><span class="line">Calculate_Time(<span class="string">f&quot;模型训练阶段&quot;</span>, model_train_time)</span><br><span class="line">Calculate_Time(<span class="string">f&quot;模型评估及绘图阶段&quot;</span>, model_eval_time)</span><br><span class="line">Calculate_Time(<span class="string">f&quot;本次训练总&quot;</span>, model_time)</span><br><span class="line">logger.debug(<span class="string">f&#x27;整体测试集精度：<span class="subst">&#123;test_accuracy:<span class="number">.2</span>f&#125;</span>%&#x27;</span>)</span><br><span class="line">logger.debug(<span class="string">f&quot;整体性能最佳的信噪比：<span class="subst">&#123;best_snr&#125;</span>，准确率：<span class="subst">&#123;best_accuracy:<span class="number">.4</span>f&#125;</span>&quot;</span>)</span><br><span class="line"></span><br><span class="line">tb_writer.close()</span><br><span class="line"></span><br><span class="line">tb_path = <span class="string">f&quot;tensorboard --logdir=E:\\python\\file\\pytorch\\PytorchProject\\NN_RF_2016\\ResNet34\\<span class="subst">&#123;current_time&#125;</span>\\runs&quot;</span></span><br><span class="line">logger.debug(<span class="string">&quot;打开anaconda命令行后输入一下命令&quot;</span>)</span><br><span class="line">logger.debug(<span class="string">&quot;conda activate pytorch&quot;</span>)</span><br><span class="li
